<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - THE VOGUE REALITY</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8faff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        .logo span { color: #e4002b; }
        
        h2 { margin-bottom: 0.5rem; font-size: 1.25rem; }
        p { color: #8993a4; font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: #4a4a4a; margin-bottom: 0.5rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #e4002b; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #e4002b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #c20025; }
        .error-msg { color: #e4002b; font-size: 0.85rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">THE VOGUE <span>REALITY</span></div>
    <h2>Admin Login</h2>
    <p>Please enter your credentials to manage properties.</p>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@voguereality.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" onclick="handleLogin()">Login to Dashboard</button>
    <div id="errorMsg" class="error-msg">Invalid email or password.</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="data.js"></script>

<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.style.display = 'none';

        try {
            await signIn(email, password);
            window.location.href = 'admin.html';
        } catch (error) {
            console.error(error);
            errorMsg.style.display = 'block';
        }
    }

    // Redirect if already logged in
    onAuthChange((user) => {
        if (user) window.location.href = 'admin.html';
    });
</script>

</body>
</html>
